<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>Snack-O Editor</title>

<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Snack-O Editor" />
<meta name="theme-color" content="#F3EFE5" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#14161A" media="(prefers-color-scheme: dark)" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:     #F3EFE5;
    --panel:  #FBF8F0;
    --ink:    #1A1C22;
    --muted:  #7A7365;
    --rule:   #CFC8B7;
    --rule-2: #E6E1D2;
    --accent: #D96B4A;
    --accent-press: #B7532F;
    --accent-tint: #FBEAE0;
    --blue: #3A7BD5;
    --blue-tint: #E4EEFB;
    --good: #2E7D5B;
    --good-tint: #E2F1EA;
    --shadow: 0 1px 2px rgba(20,22,26,.04), 0 6px 18px rgba(20,22,26,.05);
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:     #14161A;
      --panel:  #1D2026;
      --ink:    #EFE9DA;
      --muted:  #8F8877;
      --rule:   #3B3E46;
      --rule-2: #292C33;
      --accent-tint: #3A2018;
      --blue-tint: #172436;
      --good: #6BC49B;
      --good-tint: #14291F;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 6px 20px rgba(0,0,0,.35);
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.35;
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }

  .wrap { max-width: 560px; margin: 0 auto; padding: 22px 18px 180px; }
  [hidden] { display: none !important; }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 4px 4px 18px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .mark { width: 44px; height: 44px; object-fit: contain; flex: 0 0 44px; }
  h1 { font-size: 21px; font-weight: 700; letter-spacing: -.015em; margin: 0; line-height: 1.1; }
  .sub {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
    color: var(--muted); margin-top: 4px;
  }
  header .spacer { flex: 1 1 auto; }

  /* Buttons */
  button {
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--ink);
    cursor: pointer;
  }
  .btn {
    padding: 11px 16px; border-radius: 10px;
    border: 1px solid var(--rule); background: var(--panel);
    font-size: 15px; font-weight: 500;
    transition: border-color .15s ease, background .15s ease;
  }
  .btn:hover { border-color: var(--ink); }
  .btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
  .btn.primary {
    background: var(--ink); color: var(--bg); border-color: var(--ink);
    font-weight: 600;
  }
  .btn.primary:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.danger { color: var(--accent); }
  .btn.danger:hover { border-color: var(--accent); background: var(--accent-tint); }
  .btn[disabled] { opacity: .5; pointer-events: none; }
  .btn.small { padding: 7px 11px; font-size: 13px; border-radius: 8px; }
  .btn.icon {
    width: 34px; height: 34px; padding: 0; border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 15px; line-height: 1;
  }
  .linky {
    background: none; border: none; padding: 0;
    color: var(--muted); font-size: 13px; text-decoration: underline;
    text-underline-offset: 3px;
  }
  .linky:hover { color: var(--ink); }

  /* Fields */
  label.field { display: block; margin-bottom: 12px; }
  .field-label {
    display: block; margin-bottom: 5px;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--muted);
  }
  input[type="text"], input[type="password"], input[type="number"], input[type="date"], select {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--rule);
    border-radius: 10px;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 16px;             /* 16px keeps iOS from zooming on focus */
    line-height: 1.3;
  }
  input:focus, select:focus { outline: 2px solid var(--blue); outline-offset: 1px; border-color: var(--blue); }
  input.bad, select.bad { border-color: var(--accent); background: var(--accent-tint); }
  .err {
    display: none;
    margin-top: 5px; font-size: 12.5px; color: var(--accent);
  }
  .err.show { display: block; }
  input[type="number"] { font-family: 'IBM Plex Mono', ui-monospace, monospace; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Login */
  .card {
    background: var(--panel);
    border: 1px solid var(--rule-2);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
  }
  #loginView .card { max-width: 380px; margin: 0 auto; }
  #loginView p.lede { margin: 0 0 16px; font-size: 14px; color: var(--muted); }

  /* Category blocks */
  .cat {
    background: var(--panel);
    border: 1px solid var(--rule-2);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .cat-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--rule-2);
    background: var(--bg);
  }
  .cat.collapsed .cat-bar { border-bottom: none; }
  .twist {
    background: none; border: none; padding: 4px 6px;
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted);
  }
  .cat-bar input[type="text"] { flex: 1 1 auto; padding: 8px 10px; }
  .cat-count {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 11px; color: var(--muted); white-space: nowrap;
  }
  .cat-body { padding: 12px; }
  .cat-tools { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }

  /* Item blocks */
  .it {
    border: 1px solid var(--rule-2);
    border-radius: 10px;
    padding: 11px;
    margin-bottom: 10px;
    background: var(--bg);
  }
  .it.is-hidden { opacity: .62; }
  .it-top { display: grid; grid-template-columns: 1fr 104px; gap: 8px; align-items: start; }
  .it-tools {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--rule-2);
  }
  .it-tools .grow { flex: 1 1 auto; }
  .toggle {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 13px; color: var(--muted); cursor: pointer;
    padding: 6px 4px;
  }
  .toggle input { width: 17px; height: 17px; margin: 0; accent-color: var(--blue); }
  .subpanel {
    margin-top: 10px; padding: 10px;
    border-radius: 9px; background: var(--panel);
    border: 1px solid var(--rule-2);
  }
  .subpanel .field:last-child { margin-bottom: 0; }
  .flag {
    display: inline-block;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing: .08em;
    padding: 2px 6px; border-radius: 6px;
    background: var(--accent-tint); color: var(--accent);
  }
  .move-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .move-row select { flex: 1 1 auto; padding: 8px 10px; font-size: 14px; }
  .move-row .field-label { margin: 0; white-space: nowrap; }

  /* Sticky action bar */
  .bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 12px 18px calc(14px + env(safe-area-inset-bottom));
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-top: 1px solid var(--rule);
  }
  .bar .inner {
    max-width: 560px; margin: 0 auto;
    display: flex; align-items: center; gap: 10px;
  }
  .bar .inner .grow { flex: 1 1 auto; }
  .bar .btn.primary { padding: 15px 24px; font-size: 16px; }

  .note {
    margin: 0 0 12px; padding: 11px 13px;
    border-radius: 10px; font-size: 14px;
    border: 1px solid var(--rule-2); background: var(--panel);
  }
  .note.ok  { color: var(--good);   background: var(--good-tint);   border-color: var(--good); }
  .note.bad { color: var(--accent); background: var(--accent-tint); border-color: var(--accent); }

  .dim { color: var(--muted); font-size: 13px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .foot { margin-top: 22px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }

  /* Preview — mirrors the customer page */
  .pv-cat + .pv-cat { margin-top: 18px; }
  .pv-cat-title {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 500; letter-spacing: .22em; text-transform: uppercase;
    color: var(--muted); display: block; padding: 6px 2px 8px;
  }
  .pv-item {
    display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: center;
    padding: 12px 14px; margin-bottom: 8px;
    background: var(--panel); border: 1px solid var(--rule-2);
    border-radius: var(--radius); box-shadow: var(--shadow);
  }
  .pv-name { font-size: 15.5px; font-weight: 550; }
  .pv-desc { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
  .pv-prices { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .pv-price-line { display: flex; align-items: baseline; gap: 7px; }
  .pv-price {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 14px; font-weight: 500; font-variant-numeric: tabular-nums;
  }
  .pv-price.was { color: var(--muted); text-decoration: line-through; font-size: 12.5px; }
  .pv-tag {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing: .08em;
    color: var(--accent); background: var(--accent-tint);
    border-radius: 6px; padding: 2px 5px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <img class="mark" src="enjjpt-logo.png" alt="" />
    <div>
      <h1>Snack-O Editor</h1>
      <div class="sub">Menu management</div>
    </div>
    <span class="spacer"></span>
    <button class="btn small" id="signOutBtn" hidden>Sign out</button>
  </header>

  <!-- Login ------------------------------------------------------- -->
  <section id="loginView" hidden>
    <div class="card">
      <p class="lede">Enter the editor password to manage the menu.</p>
      <form id="loginForm">
        <label class="field">
          <span class="field-label">Password</span>
          <input type="password" id="passInput" autocomplete="current-password" />
        </label>
        <div class="err" id="loginErr"></div>
        <button class="btn primary" id="loginBtn" type="submit" style="width:100%;margin-top:6px;">Unlock</button>
      </form>
    </div>
  </section>

  <!-- Loading ----------------------------------------------------- -->
  <section id="loadingView">
    <div class="card"><p style="margin:0;">Loading…</p></div>
  </section>

  <!-- Editor ------------------------------------------------------ -->
  <section id="editorView" hidden>
    <div id="notice"></div>

    <div class="card" style="margin-bottom:14px;">
      <label class="field">
        <span class="field-label">Stand name</span>
        <input type="text" id="menuName" maxlength="60" />
        <span class="err" id="menuNameErr"></span>
      </label>
      <label class="field" style="margin-bottom:0;">
        <span class="field-label">Venmo username (no @)</span>
        <input type="text" id="venmoName" autocapitalize="off" autocorrect="off" spellcheck="false" />
        <span class="err" id="venmoNameErr"></span>
      </label>
    </div>

    <div id="cats"></div>

    <button class="btn" id="addCatBtn" style="width:100%;">+ Add category</button>

    <div class="foot">
      <a class="linky" id="historyLink" href="https://github.com/D-Pretzel/snacko/commits/main/menu.json" target="_blank" rel="noopener">See past versions</a>
      <span class="dim" id="unsaved"></span>
    </div>
  </section>

  <!-- Preview ----------------------------------------------------- -->
  <section id="previewView" hidden>
    <p class="dim" style="margin-top:0;">This is what customers will see once you save.</p>
    <div id="previewBody"></div>
  </section>

</div>

<div class="bar" id="actionBar" hidden>
  <div class="inner">
    <button class="btn" id="previewBtn">Preview</button>
    <span class="grow"></span>
    <button class="btn primary" id="saveBtn">Save changes</button>
  </div>
</div>

<script>
/* =================================================================
   Set this to the URL wrangler prints after `wrangler deploy`.
   ================================================================= */
const WORKER_URL = "https://snacko.petzoldavid02.workers.dev";

const REPO = "D-Pretzel/snacko";
const PASS_KEY = "snacko.editPass";

const MAX_NAME = 60;
const MAX_DESC = 200;

/* ---------------- shared pricing rules (same as index.html) ------ */

function todayLocalISO() {
  const d = new Date(), pad = n => String(n).padStart(2, "0");
  return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
}
function saleExpired(sale) {
  return !!(sale && sale.until && String(sale.until) < todayLocalISO());
}
function activeSale(item) {
  const s = item.sale;
  if (!s || typeof s.percentOff !== "number") return null;
  if (!(s.percentOff >= 1 && s.percentOff <= 99)) return null;
  if (saleExpired(s)) return null;
  return s;
}
function effectivePrice(item) {
  const s = activeSale(item);
  const price = Number(item.price) || 0;
  if (!s) return price;
  return Math.round(price * (1 - s.percentOff / 100) * 100) / 100;
}

/* ---------------- tiny DOM helpers ------------------------------- */

function el(tag, className, text) {
  const n = document.createElement(tag);
  if (className) n.className = className;
  if (text !== undefined) n.textContent = text;
  return n;
}
function $(id) { return document.getElementById(id); }

/* ---------------- app state -------------------------------------- */

let menu = null;          // in-memory working copy; nothing leaves until Save
let baseline = null;      // last known saved state, used to describe the change
let pass = null;
let dirty = false;
let previewing = false;
const collapsed = new Set();   // category indexes the user rolled up
const openDesc = new Set();    // item keys whose description field is showing
let itemSeq = 0;

function markDirty() {
  dirty = true;
  $("unsaved").textContent = "Unsaved changes";
}
function markClean() {
  dirty = false;
  $("unsaved").textContent = "";
}

window.addEventListener("beforeunload", e => {
  if (dirty) { e.preventDefault(); e.returnValue = ""; }
});

/* ---------------- views ------------------------------------------ */

function show(view) {
  $("loginView").hidden   = view !== "login";
  $("loadingView").hidden = view !== "loading";
  $("editorView").hidden  = view !== "editor";
  $("previewView").hidden = view !== "preview";
  $("actionBar").hidden   = (view !== "editor" && view !== "preview");
  $("signOutBtn").hidden  = (view === "login" || view === "loading");
}

function notice(kind, text) {
  const box = $("notice");
  box.replaceChildren();
  if (!text) return;
  box.appendChild(el("p", "note " + kind, text));
}

/* ---------------- auth ------------------------------------------- */

async function verifyPassword(candidate) {
  const res = await fetch(WORKER_URL.replace(/\/$/, "") + "/verify", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ pass: candidate }),
  });
  if (res.ok) return { ok: true };
  let message = "Incorrect password.";
  try {
    const body = await res.json();
    if (body && body.error) message = body.error;
  } catch { /* keep the default */ }
  return { ok: false, message };
}

$("loginForm").addEventListener("submit", async e => {
  e.preventDefault();
  const btn = $("loginBtn");
  const errEl = $("loginErr");
  const candidate = $("passInput").value;
  errEl.classList.remove("show");
  if (!candidate) {
    errEl.textContent = "Enter the password.";
    errEl.classList.add("show");
    return;
  }
  btn.disabled = true;
  btn.textContent = "Checking…";
  try {
    const result = await verifyPassword(candidate);
    if (!result.ok) {
      errEl.textContent = result.message;
      errEl.classList.add("show");
      return;
    }
    pass = candidate;
    localStorage.setItem(PASS_KEY, candidate);
    $("passInput").value = "";
    if (menu && dirty) {
      /* Signed out mid-edit by a rotated password. Reloading here would throw
         away the very work we promised to keep. */
      renderEditor();
      show("editor");
      notice("", "");
    } else {
      await loadMenu();
    }
  } catch (err) {
    errEl.textContent = "Couldn't reach the server. Check your connection.";
    errEl.classList.add("show");
  } finally {
    btn.disabled = false;
    btn.textContent = "Unlock";
  }
});

/* `discard` is true only when the user chose to sign out. When the Worker
   rejects the password mid-save we keep the working copy, because the whole
   point of the message we show is that the edits survive. */
function signOut(message, discard) {
  pass = null;
  localStorage.removeItem(PASS_KEY);
  if (discard) { menu = null; baseline = null; dirty = false; }
  show("login");
  const errEl = $("loginErr");
  if (message) { errEl.textContent = message; errEl.classList.add("show"); }
  else { errEl.classList.remove("show"); }
}

$("signOutBtn").addEventListener("click", () => {
  if (dirty && !confirm("You have unsaved changes. Sign out anyway?")) return;
  signOut(null, true);
});

/* ---------------- load ------------------------------------------- */

async function loadMenu() {
  show("loading");
  try {
    const res = await fetch(`menu.json?v=${Date.now()}`, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    menu = normalize(await res.json());
  } catch (err) {
    show("editor");
    notice("bad", "Couldn't load the current menu (" + err.message + "). Reload to try again.");
    menu = normalize(null);
  }
  baseline = serialize();
  markClean();
  renderEditor();
  show("editor");
}

function normalize(raw) {
  const src = (raw && typeof raw === "object") ? raw : {};
  return {
    name: typeof src.name === "string" ? src.name : "Snack-O",
    venmoUsername: typeof src.venmoUsername === "string" ? src.venmoUsername : "",
    categories: (Array.isArray(src.categories) ? src.categories : []).map(cat => ({
      label: (cat && typeof cat.label === "string") ? cat.label : "",
      items: (Array.isArray(cat && cat.items) ? cat.items : []).map(it => ({
        _key: "i" + (++itemSeq),
        name: (it && typeof it.name === "string") ? it.name : "",
        price: (it && typeof it.price === "number") ? it.price : 0,
        description: (it && typeof it.description === "string") ? it.description : "",
        hidden: !!(it && it.hidden),
        sale: (it && it.sale && typeof it.sale === "object")
          ? { percentOff: Number(it.sale.percentOff) || 0, until: typeof it.sale.until === "string" ? it.sale.until : "" }
          : null,
      })),
    })),
  };
}

/* ---------------- editor rendering ------------------------------- */

function renderEditor() {
  $("menuName").value = menu.name;
  $("venmoName").value = menu.venmoUsername;

  const host = $("cats");
  host.replaceChildren();
  menu.categories.forEach((cat, ci) => host.appendChild(categoryBlock(cat, ci)));

  if (menu.categories.length === 0) {
    host.appendChild(el("p", "dim", "No categories yet. Add one to get started."));
  }
}

function categoryBlock(cat, ci) {
  const box = el("section", "cat");
  box.dataset.ci = ci;
  const isCollapsed = collapsed.has(ci);
  if (isCollapsed) box.classList.add("collapsed");

  /* Header: twist, inline rename, count, reorder, delete */
  const bar = el("div", "cat-bar");

  const twist = el("button", "twist", isCollapsed ? "▸" : "▾");
  twist.type = "button";
  twist.setAttribute("aria-label", isCollapsed ? "Expand category" : "Collapse category");
  twist.addEventListener("click", () => {
    if (collapsed.has(ci)) collapsed.delete(ci); else collapsed.add(ci);
    renderEditor();
  });
  bar.appendChild(twist);

  const label = el("input");
  label.type = "text";
  label.value = cat.label;
  label.maxLength = MAX_NAME;
  label.placeholder = "Category name";
  label.setAttribute("aria-label", "Category name");
  label.dataset.err = "cat-" + ci;
  label.addEventListener("input", () => {
    cat.label = label.value;
    markDirty();
    box.querySelectorAll(".cat-count").forEach(n => { /* count unchanged */ });
    clearFieldError(label);
    refreshMoveOptions();
  });
  bar.appendChild(label);

  bar.appendChild(el("span", "cat-count", cat.items.length + (cat.items.length === 1 ? " item" : " items")));

  const up = iconBtn("↑", "Move category up", () => moveCategory(ci, -1));
  const down = iconBtn("↓", "Move category down", () => moveCategory(ci, 1));
  up.disabled = ci === 0;
  down.disabled = ci === menu.categories.length - 1;
  bar.append(up, down);

  box.appendChild(bar);

  const labelErr = el("div", "err");
  labelErr.id = "err-cat-" + ci;
  labelErr.style.padding = "0 12px";
  box.appendChild(labelErr);

  if (isCollapsed) return box;

  const body = el("div", "cat-body");
  cat.items.forEach((item, ii) => body.appendChild(itemBlock(item, ci, ii)));

  if (cat.items.length === 0) {
    body.appendChild(el("p", "dim", "No items in this category yet."));
  }

  const tools = el("div", "cat-tools");
  const addItem = el("button", "btn small", "+ Add item");
  addItem.type = "button";
  addItem.addEventListener("click", () => {
    cat.items.push({ _key: "i" + (++itemSeq), name: "", price: 0, description: "", hidden: false, sale: null });
    markDirty();
    renderEditor();
    focusLastItem(ci);
  });
  const delCat = el("button", "btn small danger", "Delete category");
  delCat.type = "button";
  delCat.addEventListener("click", () => {
    const what = cat.label.trim() || "this category";
    const extra = cat.items.length ? ` and its ${cat.items.length} item(s)` : "";
    if (!confirm(`Delete ${what}${extra}? This cannot be undone until you reload without saving.`)) return;
    menu.categories.splice(ci, 1);
    collapsed.clear();
    markDirty();
    renderEditor();
  });
  tools.append(addItem, delCat);
  body.appendChild(tools);

  box.appendChild(body);
  return box;
}

function itemBlock(item, ci, ii) {
  const cat = menu.categories[ci];
  const box = el("div", "it");
  if (item.hidden) box.classList.add("is-hidden");
  box.dataset.key = item._key;

  /* Name + price */
  const top = el("div", "it-top");

  const nameWrap = el("div");
  const nameLbl = el("span", "field-label", "Item");
  const name = el("input");
  name.type = "text";
  name.value = item.name;
  name.maxLength = MAX_NAME;
  name.placeholder = "Item name";
  name.setAttribute("aria-label", "Item name");
  name.dataset.err = "name-" + item._key;
  name.addEventListener("input", () => { item.name = name.value; clearFieldError(name); markDirty(); });
  nameWrap.append(nameLbl, name, errSpan("name-" + item._key));
  top.appendChild(nameWrap);

  const priceWrap = el("div");
  const priceLbl = el("span", "field-label", "Price");
  const price = el("input");
  price.type = "number";
  price.step = "0.01";
  price.min = "0";
  price.inputMode = "decimal";
  price.value = Number.isFinite(item.price) ? item.price.toFixed(2) : "";
  price.setAttribute("aria-label", "Price in dollars");
  price.dataset.err = "price-" + item._key;
  price.addEventListener("input", () => {
    item.price = price.value === "" ? NaN : Number(price.value);
    clearFieldError(price);
    markDirty();
  });
  priceWrap.append(priceLbl, price, errSpan("price-" + item._key));
  top.appendChild(priceWrap);

  box.appendChild(top);

  /* Description, collapsed behind a control unless one already exists */
  const descOpen = openDesc.has(item._key) || (item.description && item.description.trim() !== "");
  if (descOpen) {
    const wrap = el("div", "subpanel");
    const lbl = el("span", "field-label", "Description");
    const desc = el("input");
    desc.type = "text";
    desc.value = item.description;
    desc.maxLength = MAX_DESC;
    desc.placeholder = "e.g. 12 oz cans";
    desc.setAttribute("aria-label", "Item description");
    desc.dataset.err = "desc-" + item._key;
    desc.addEventListener("input", () => { item.description = desc.value; clearFieldError(desc); markDirty(); });
    wrap.append(lbl, desc, errSpan("desc-" + item._key));
    box.appendChild(wrap);
  }

  /* Sale panel */
  if (item.sale) {
    const wrap = el("div", "subpanel");

    const head = el("div");
    head.style.cssText = "display:flex;align-items:center;gap:8px;margin-bottom:8px;";
    head.appendChild(el("span", "field-label", "Sale"));
    head.querySelector(".field-label").style.margin = "0";
    if (saleExpired(item.sale)) {
      head.appendChild(el("span", "flag", "EXPIRED"));
      const clear = el("button", "btn small danger", "Clear sale");
      clear.type = "button";
      clear.style.marginLeft = "auto";
      clear.addEventListener("click", () => { item.sale = null; markDirty(); renderEditor(); });
      head.appendChild(clear);
    }
    wrap.appendChild(head);

    const grid = el("div", "row-2");

    const pctWrap = el("div");
    pctWrap.appendChild(el("span", "field-label", "% off"));
    const pct = el("input");
    pct.type = "number";
    pct.step = "1";
    pct.min = "1";
    pct.max = "99";
    pct.inputMode = "numeric";
    pct.value = item.sale.percentOff ? String(item.sale.percentOff) : "";
    pct.setAttribute("aria-label", "Percent off");
    pct.dataset.err = "pct-" + item._key;
    pct.addEventListener("input", () => {
      item.sale.percentOff = pct.value === "" ? NaN : Number(pct.value);
      clearFieldError(pct);
      markDirty();
    });
    pctWrap.append(pct, errSpan("pct-" + item._key));

    const untilWrap = el("div");
    untilWrap.appendChild(el("span", "field-label", "Ends after (optional)"));
    const until = el("input");
    until.type = "date";
    until.value = item.sale.until || "";
    until.setAttribute("aria-label", "Sale end date");
    until.dataset.err = "until-" + item._key;
    until.addEventListener("input", () => { item.sale.until = until.value; clearFieldError(until); markDirty(); });
    untilWrap.append(until, errSpan("until-" + item._key));

    grid.append(pctWrap, untilWrap);
    wrap.appendChild(grid);
    box.appendChild(wrap);
  }

  /* Move between categories */
  if (menu.categories.length > 1) {
    const move = el("div", "move-row");
    move.appendChild(el("span", "field-label", "In"));
    const sel = el("select");
    sel.className = "move-select";
    sel.setAttribute("aria-label", "Category");
    fillCategoryOptions(sel, ci);
    sel.addEventListener("change", () => {
      const target = Number(sel.value);
      if (target === ci || Number.isNaN(target)) return;
      cat.items.splice(ii, 1);
      menu.categories[target].items.push(item);
      collapsed.delete(target);
      markDirty();
      renderEditor();
    });
    move.appendChild(sel);
    box.appendChild(move);
  }

  /* Row of controls */
  const tools = el("div", "it-tools");

  const saleTog = toggle("Sale", !!item.sale, on => {
    item.sale = on ? { percentOff: 10, until: "" } : null;
    markDirty();
    renderEditor();
  });
  const hideTog = toggle("Hide", !!item.hidden, on => {
    item.hidden = on;
    markDirty();
    renderEditor();
  });
  tools.append(saleTog, hideTog);

  if (!descOpen) {
    const addDesc = el("button", "btn small", "Add description");
    addDesc.type = "button";
    addDesc.addEventListener("click", () => {
      openDesc.add(item._key);
      renderEditor();
      const field = document.querySelector(`[data-err="desc-${item._key}"]`);
      if (field) field.focus();
    });
    tools.appendChild(addDesc);
  }

  tools.appendChild(el("span", "grow"));

  const up = iconBtn("↑", "Move item up", () => moveItem(ci, ii, -1));
  const down = iconBtn("↓", "Move item down", () => moveItem(ci, ii, 1));
  up.disabled = ii === 0;
  down.disabled = ii === cat.items.length - 1;

  const del = el("button", "btn icon danger", "✕");
  del.type = "button";
  del.setAttribute("aria-label", "Delete item");
  del.addEventListener("click", () => {
    const what = item.name.trim() || "this item";
    if (!confirm(`Delete ${what}?`)) return;
    cat.items.splice(ii, 1);
    markDirty();
    renderEditor();
  });

  tools.append(up, down, del);
  box.appendChild(tools);

  return box;
}

function toggle(text, checked, onChange) {
  const lab = el("label", "toggle");
  const cb = el("input");
  cb.type = "checkbox";
  cb.checked = checked;
  cb.addEventListener("change", () => onChange(cb.checked));
  lab.append(cb, el("span", null, text));
  return lab;
}

function iconBtn(glyph, label, onClick) {
  const b = el("button", "btn icon", glyph);
  b.type = "button";
  b.setAttribute("aria-label", label);
  b.addEventListener("click", onClick);
  return b;
}

function errSpan(key) {
  const s = el("span", "err");
  s.id = "err-" + key;
  return s;
}

function fillCategoryOptions(sel, selectedIndex) {
  sel.replaceChildren();
  menu.categories.forEach((c, i) => {
    const opt = el("option", null, c.label.trim() || `Category ${i + 1}`);
    opt.value = String(i);
    if (i === selectedIndex) opt.selected = true;
    sel.appendChild(opt);
  });
}

/* Category renames should show up in the move dropdowns without a full redraw,
   which would steal focus from the field being typed into. */
function refreshMoveOptions() {
  document.querySelectorAll(".move-select").forEach(sel => {
    const keep = sel.value;
    fillCategoryOptions(sel, Number(keep));
  });
}

function moveCategory(ci, delta) {
  const target = ci + delta;
  if (target < 0 || target >= menu.categories.length) return;
  const [c] = menu.categories.splice(ci, 1);
  menu.categories.splice(target, 0, c);
  collapsed.clear();
  markDirty();
  renderEditor();
}

function moveItem(ci, ii, delta) {
  const items = menu.categories[ci].items;
  const target = ii + delta;
  if (target < 0 || target >= items.length) return;
  const [it] = items.splice(ii, 1);
  items.splice(target, 0, it);
  markDirty();
  renderEditor();
}

function focusLastItem(ci) {
  const cats = document.querySelectorAll(".cat");
  const block = cats[ci];
  if (!block) return;
  const inputs = block.querySelectorAll('.it input[type="text"]');
  const last = inputs[inputs.length - 1];
  if (last) { last.focus(); last.scrollIntoView({ block: "center", behavior: "smooth" }); }
}

$("menuName").addEventListener("input", e => {
  menu.name = e.target.value;
  clearFieldError(e.target);
  markDirty();
});
$("venmoName").addEventListener("input", e => {
  menu.venmoUsername = e.target.value;
  clearFieldError(e.target);
  markDirty();
});

$("addCatBtn").addEventListener("click", () => {
  menu.categories.push({ label: "", items: [] });
  markDirty();
  renderEditor();
  const inputs = document.querySelectorAll(".cat-bar input");
  const last = inputs[inputs.length - 1];
  if (last) { last.focus(); last.scrollIntoView({ block: "center", behavior: "smooth" }); }
});

/* ---------------- validation ------------------------------------- */

function clearFieldError(field) {
  field.classList.remove("bad");
  const key = field.dataset.err;
  const box = key ? $("err-" + key) : null;
  if (box) { box.textContent = ""; box.classList.remove("show"); }
}

function clearAllErrors() {
  document.querySelectorAll("#editorView input.bad, #editorView select.bad")
    .forEach(n => n.classList.remove("bad"));
  document.querySelectorAll("#editorView .err").forEach(n => {
    n.textContent = "";
    n.classList.remove("show");
  });
}

function flagField(key, message, problems) {
  const field = document.querySelector(`[data-err="${key}"]`) ||
                (key === "menuName" || key === "venmoName" ? $(key) : null);
  const box = $("err-" + key) || $(key + "Err");
  if (field) field.classList.add("bad");
  if (box) { box.textContent = message; box.classList.add("show"); }
  problems.push({ field, message });
}

/* Enforces every rule from the schema. The Worker checks all of this again. */
function validate() {
  clearAllErrors();
  const problems = [];

  const name = menu.name.trim();
  if (name === "") flagField("menuName", "The stand needs a name.", problems);
  else if (name.length > MAX_NAME) flagField("menuName", `Keep it to ${MAX_NAME} characters.`, problems);

  if (menu.venmoUsername.trim() === "") {
    flagField("venmoName", "A Venmo username is required, or nobody can pay.", problems);
  }

  if (menu.categories.length === 0) {
    notice("bad", "Add at least one category before saving.");
    problems.push({ field: null, message: "no categories" });
  }

  const seen = new Map();
  menu.categories.forEach((cat, ci) => {
    const label = cat.label.trim();
    if (label === "") {
      flagField("cat-" + ci, "Give this category a name.", problems);
    } else if (label.length > MAX_NAME) {
      flagField("cat-" + ci, `Keep it to ${MAX_NAME} characters.`, problems);
    } else {
      const key = label.toLowerCase();
      if (seen.has(key)) {
        flagField("cat-" + ci, `Another category is already called "${label}".`, problems);
      } else {
        seen.set(key, ci);
      }
    }

    cat.items.forEach(item => {
      const k = item._key;
      const itemName = item.name.trim();
      if (itemName === "") flagField("name-" + k, "Every item needs a name.", problems);
      else if (itemName.length > MAX_NAME) flagField("name-" + k, `Keep it to ${MAX_NAME} characters.`, problems);

      const price = item.price;
      if (typeof price !== "number" || !Number.isFinite(price)) {
        flagField("price-" + k, "Enter a price.", problems);
      } else if (price < 0) {
        flagField("price-" + k, "Price can't be negative.", problems);
      } else if (Math.abs(price * 100 - Math.round(price * 100)) > 1e-6) {
        flagField("price-" + k, "Use at most two decimal places.", problems);
      }

      if (item.description && item.description.length > MAX_DESC) {
        flagField("desc-" + k, `Keep the description under ${MAX_DESC} characters.`, problems);
      }

      if (item.sale) {
        const pct = item.sale.percentOff;
        if (!Number.isInteger(pct) || pct < 1 || pct > 99) {
          flagField("pct-" + k, "Use a whole number from 1 to 99.", problems);
        }
        if (item.sale.until && !/^\d{4}-\d{2}-\d{2}$/.test(item.sale.until)) {
          flagField("until-" + k, "Use a date like 2026-08-01.", problems);
        }
      }
    });
  });

  if (problems.length) {
    const first = problems.find(p => p.field);
    if (first) {
      first.field.scrollIntoView({ block: "center", behavior: "smooth" });
      first.field.focus({ preventScroll: true });
    }
    return false;
  }
  return true;
}

/* ---------------- serialization ---------------------------------- */

/* Built with JSON.stringify from validated state, never by concatenation, so
   the output is valid by construction. */
function serialize() {
  return {
    name: menu.name.trim(),
    venmoUsername: menu.venmoUsername.trim(),
    categories: menu.categories.map(cat => ({
      label: cat.label.trim(),
      items: cat.items.map(item => {
        const out = { name: item.name.trim(), price: round2(item.price) };
        const desc = (item.description || "").trim();
        if (desc) out.description = desc;
        if (item.sale && Number.isInteger(item.sale.percentOff)) {
          out.sale = { percentOff: item.sale.percentOff };
          if (item.sale.until) out.sale.until = item.sale.until;
        }
        if (item.hidden) out.hidden = true;
        return out;
      }),
    })),
  };
}

function round2(n) { return Math.round(n * 100) / 100; }

/* The commit message is built by diffing against what we loaded, so the history
   reads like "Menu update: Red Bull 20% off" instead of one repeated string. */
function summarize(next) {
  if (!baseline) return "menu updated";
  const changes = describeChanges(baseline, next);
  if (changes.length === 0) return "no visible change";
  if (changes.length <= 2) return changes.join(", ");
  return `${changes[0]}, +${changes.length - 1} more changes`;
}

function describeChanges(before, after) {
  const out = [];
  const money = n => "$" + n.toFixed(2);

  if (before.name !== after.name) out.push(`renamed stand to ${after.name}`);
  if (before.venmoUsername !== after.venmoUsername) out.push("changed Venmo username");

  const catsBefore = before.categories.map(c => c.label);
  const catsAfter = after.categories.map(c => c.label);
  catsAfter.filter(l => !catsBefore.includes(l)).forEach(l => out.push(`added category ${l}`));
  catsBefore.filter(l => !catsAfter.includes(l)).forEach(l => out.push(`removed category ${l}`));

  const index = menu => {
    const map = new Map();
    menu.categories.forEach(c => c.items.forEach(i => map.set(i.name, { item: i, cat: c.label })));
    return map;
  };
  const b = index(before), a = index(after);

  a.forEach((rec, name) => {
    if (!b.has(name)) { out.push(`added ${name}`); return; }
    const was = b.get(name);
    if (was.item.price !== rec.item.price) {
      out.push(`${name} ${money(was.item.price)} to ${money(rec.item.price)}`);
    }
    const sb = was.item.sale, sa = rec.item.sale;
    if (!sb && sa) out.push(`${name} ${sa.percentOff}% off`);
    else if (sb && !sa) out.push(`${name} sale ended`);
    else if (sb && sa && sb.percentOff !== sa.percentOff) out.push(`${name} now ${sa.percentOff}% off`);
    if (!was.item.hidden && rec.item.hidden) out.push(`hid ${name}`);
    if (was.item.hidden && !rec.item.hidden) out.push(`unhid ${name}`);
    if (was.cat !== rec.cat && catsAfter.includes(was.cat)) out.push(`moved ${name} to ${rec.cat}`);
    if ((was.item.description || "") !== (rec.item.description || "")) {
      out.push(`updated ${name} description`);
    }
  });
  b.forEach((rec, name) => {
    if (!a.has(name) && catsAfter.includes(rec.cat)) out.push(`removed ${name}`);
  });

  /* Reordering changes nothing about any single item, so compare sequences too.
     Without this, a save that only moves rows around reads as "no change". */
  const common = catsAfter.filter(l => catsBefore.includes(l));
  if (common.join("␀") !== catsBefore.filter(l => catsAfter.includes(l)).join("␀")) {
    out.push("reordered categories");
  }
  common.forEach(label => {
    const names = menu => {
      const cat = menu.categories.find(c => c.label === label);
      return cat ? cat.items.map(i => i.name) : [];
    };
    const nb = names(before), na = names(after);
    const shared = new Set(nb.filter(n => na.includes(n)));
    const seq = list => list.filter(n => shared.has(n)).join("␀");
    if (seq(nb) !== seq(na)) out.push(`reordered ${label}`);
  });

  return out;
}

/* ---------------- save ------------------------------------------- */

$("saveBtn").addEventListener("click", async () => {
  if (previewing) togglePreview();
  notice("", "");
  if (!validate()) {
    notice("bad", "Fix the highlighted fields, then save again.");
    return;
  }

  const btn = $("saveBtn");
  btn.disabled = true;
  btn.textContent = "Saving…";

  const payload = serialize();
  try {
    const res = await fetch(WORKER_URL.replace(/\/$/, "") + "/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pass, menu: payload, summary: summarize(payload) }),
    });

    if (res.status === 401) {
      /* Password changed or was wrong. Edits stay in memory behind the login. */
      signOut("That password no longer works. Sign in again — your edits are still here.");
      return;
    }

    if (!res.ok) {
      let message = "Save failed (HTTP " + res.status + ").";
      try {
        const body = await res.json();
        if (body && body.error) message = body.error;
      } catch { /* keep the default */ }
      notice("bad", message + " Nothing was lost — your edits are still on this page.");
      return;
    }

    baseline = payload;
    markClean();
    notice("ok", "Saved. The live page will show the change within about a minute.");
  } catch (err) {
    notice("bad", "Couldn't reach the server. Your edits are still here — try again in a moment.");
  } finally {
    btn.disabled = false;
    btn.textContent = "Save changes";
  }
});

/* ---------------- preview ---------------------------------------- */

$("previewBtn").addEventListener("click", togglePreview);

function togglePreview() {
  previewing = !previewing;
  $("previewBtn").textContent = previewing ? "Back to editing" : "Preview";
  if (previewing) { renderPreview(); show("preview"); }
  else { show("editor"); }
}

function renderPreview() {
  const host = $("previewBody");
  host.replaceChildren();
  let any = false;

  menu.categories.forEach(cat => {
    const items = cat.items.filter(it => !it.hidden);
    if (items.length === 0) return;
    any = true;

    const section = el("section", "pv-cat");
    section.appendChild(el("span", "pv-cat-title", cat.label.trim() || "Untitled"));

    items.forEach(item => {
      const row = el("div", "pv-item");
      const left = el("div");
      left.appendChild(el("div", "pv-name", item.name.trim() || "Untitled item"));
      if (item.description && item.description.trim()) {
        left.appendChild(el("div", "pv-desc", item.description.trim()));
      }
      row.appendChild(left);

      const prices = el("div", "pv-prices");
      const sale = activeSale(item);
      const base = Number(item.price) || 0;
      if (sale) {
        prices.appendChild(el("span", "pv-tag", sale.percentOff + "% OFF"));
        const line = el("span", "pv-price-line");
        line.appendChild(el("span", "pv-price was", base.toFixed(2)));
        line.appendChild(el("span", "pv-price", effectivePrice(item).toFixed(2)));
        prices.appendChild(line);
      } else {
        prices.appendChild(el("span", "pv-price", base.toFixed(2)));
      }
      row.appendChild(prices);
      section.appendChild(row);
    });

    host.appendChild(section);
  });

  if (!any) host.appendChild(el("p", "dim", "Nothing visible yet — every item is hidden or the menu is empty."));
}

/* ---------------- boot ------------------------------------------- */

$("historyLink").href = `https://github.com/${REPO}/commits/main/menu.json`;

(async function boot() {
  const saved = localStorage.getItem(PASS_KEY);
  if (!saved) { show("login"); return; }
  show("loading");
  try {
    const result = await verifyPassword(saved);
    if (!result.ok) { signOut(result.message); return; }
    pass = saved;
    await loadMenu();
  } catch (err) {
    signOut("Couldn't reach the server. Try again when you have a connection.");
  }
})();
</script>
