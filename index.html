<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Snack-O</title>

<!-- ============================================================= -->
<!--  The menu lives in menu.json, not in this file.                -->
<!--  Edit it from admin.html, or edit menu.json directly on GitHub. -->
<!-- ============================================================= -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:     #F3EFE5;
    --panel:  #FBF8F0;
    --ink:    #1A1C22;
    --muted:  #7A7365;
    --rule:   #CFC8B7;
    --rule-2: #E6E1D2;
    --accent: #D96B4A;         /* warm coral — used for pay + minus hover */
    --accent-press: #B7532F;
    --accent-tint: #FBEAE0;
    --blue: #3A7BD5;           /* selection blue — active row + plus hover */
    --blue-tint: #E4EEFB;
    --venmo: #008CFF;
    --shadow: 0 1px 2px rgba(20,22,26,.04), 0 6px 18px rgba(20,22,26,.05);
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:     #14161A;
      --panel:  #1D2026;
      --ink:    #EFE9DA;
      --muted:  #8F8877;
      --rule:   #3B3E46;
      --rule-2: #292C33;
      --accent-tint: #3A2018;
      --blue-tint: #172436;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 6px 20px rgba(0,0,0,.35);
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.35;
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }

  .wrap { max-width: 520px; margin: 0 auto; padding: 22px 18px 200px; }

  /* Header */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 4px 4px 20px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .mark { width: 56px; height: 56px; object-fit: contain; flex: 0 0 56px; }
  h1 {
    font-size: 26px; font-weight: 700; letter-spacing: -.015em;
    margin: 0; line-height: 1;
  }

  /* Category sections */
  .cat + .cat { margin-top: 22px; }
  .cat-head {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 4px 8px;
  }
  .cat-title {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: .22em; text-transform: uppercase;
    color: var(--muted);
  }
  .cat-rule { flex: 1 1 auto; height: 1px; background: var(--rule-2); }

  /* Item rows — soft cards with ledger interior */
  .list { display: flex; flex-direction: column; gap: 8px; }
  .item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--panel);
    border: 1px solid var(--rule-2);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transition: border-color .18s ease, background .18s ease;
  }
  .item.active {
    border-color: var(--blue);
    background: var(--blue-tint);
  }

  .name-lead {
    display: flex; align-items: baseline; gap: 8px;
    min-width: 0; overflow: hidden;
  }
  .name {
    font-size: 15.5px; font-weight: 550;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 0 1 auto;
  }
  .lead {
    flex: 1 1 auto; height: 1px; min-width: 12px;
    background-image: radial-gradient(circle, var(--rule) 1px, transparent 1.2px);
    background-size: 6px 2px; background-repeat: repeat-x;
    background-position: left center;
    transform: translateY(-3px);
  }
  .price {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 14px; font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }

  /* Description — muted second line under the name */
  .name-block { min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .desc {
    font-size: 12.5px; color: var(--muted);
    overflow: hidden; text-overflow: ellipsis;
  }

  /* Sale pricing — stacked so the tag never steals width from the item name */
  .price-block { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .price-line { display: flex; align-items: baseline; gap: 7px; }
  .price.was {
    color: var(--muted);
    text-decoration: line-through;
    font-size: 12.5px;
  }
  .sale-tag {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 10px; font-weight: 500; letter-spacing: .08em;
    color: var(--accent);
    background: var(--accent-tint);
    border-radius: 6px;
    padding: 2px 5px;
    white-space: nowrap;
  }

  /* Stepper — friendlier rounded, but still POS-clean */
  .qty { display: flex; align-items: center; gap: 6px; }
  .qty button {
    width: 34px; height: 34px; border-radius: 9px;
    border: 1px solid var(--rule); background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 18px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
    transition: background .15s ease, opacity .15s ease, border-color .15s ease;
  }
  .qty button:hover { background: var(--panel); }
  .qty .plus:hover  { border-color: var(--blue); }
  .qty .minus:hover { border-color: var(--accent); }
  .qty .plus:focus-visible  { outline: 2px solid var(--blue);   outline-offset: 2px; }
  .qty .minus:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .qty .minus[disabled] {
    opacity: .35; pointer-events: none; border-color: var(--rule-2);
  }
  .qty .q-num {
    min-width: 20px; text-align: center;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 14px; font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  /* Loading + error states */
  .state {
    padding: 28px 18px; text-align: center;
    background: var(--panel);
    border: 1px solid var(--rule-2);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .state p { margin: 0 0 4px; }
  .state .hint { font-size: 13px; color: var(--muted); }
  .retry {
    margin-top: 16px;
    padding: 11px 20px; border-radius: 10px;
    border: 1px solid var(--rule); background: var(--bg); color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer;
  }
  .retry:hover { border-color: var(--accent); }
  .retry:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Sticky totals bar */
  .bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 14px 18px calc(16px + env(safe-area-inset-bottom));
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-top: 1px solid var(--rule);
  }
  .bar .inner { max-width: 520px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  .tot-lines { display: flex; flex-direction: column; gap: 4px; }
  .tot-lines .line {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 11.5px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted);
  }
  .tot-lines .line .val {
    color: var(--ink); font-variant-numeric: tabular-nums;
    letter-spacing: normal; text-transform: none;
  }
  .tot-lines .line.total {
    padding-top: 8px; border-top: 1px dashed var(--rule);
    font-size: 12.5px; color: var(--ink);
  }
  .tot-lines .line.total .val { font-size: 24px; font-weight: 600; }

  .pay {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 19px 22px;
    border: none; border-radius: 14px;
    background: var(--ink); color: var(--bg);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 17px; font-weight: 600;
    letter-spacing: .04em;
    text-decoration: none; cursor: pointer;
    transition: background .18s ease, color .18s ease;
  }
  .pay:hover { background: var(--venmo); color: #fff; }
  .pay:focus-visible { outline: 2px solid var(--venmo); outline-offset: 2px; }
  .pay.disabled { background: var(--rule); color: var(--muted); pointer-events: none; }
  .pay .arrow { font-family: 'IBM Plex Mono', monospace; font-size: 18px; }

  .pay .label { display: inline-flex; align-items: center; gap: 12px; }
  .venmo-logo {
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 7px; padding: 2px;
    background: transparent;
    transition: background .18s ease;
  }
  .venmo-logo img { width: 100%; height: 100%; display: block; }
  .pay:hover .venmo-logo { background: #fff; }
  .pay.disabled .venmo-logo { opacity: .5; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <img class="mark" src="enjjpt-logo.png" alt="459th FTS Twin Dragons emblem" />
      <h1>Snack-O</h1>
    </header>

    <div id="menu">
      <div class="state"><p>Loading menu…</p></div>
    </div>
  </div>

  <div class="bar">
    <div class="inner">
      <div class="tot-lines">
        <div class="line"><span>Items</span><span class="val" id="count">0</span></div>
        <div class="line total"><span>Total</span><span class="val" id="total">$0.00</span></div>
      </div>
      <a class="pay disabled" id="payBtn" href="#">
        <span class="label">
          <span class="venmo-logo" aria-hidden="true">
            <img src="venmo-logo.png" alt="" />
          </span>
          <span>Pay with Venmo</span>
        </span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>

<script>
  const money = n => "$" + n.toFixed(2);

  /* Today as YYYY-MM-DD in local time, so a sale ending "today" is still on. */
  function todayLocalISO() {
    const d = new Date();
    const pad = n => String(n).padStart(2, "0");
    return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
  }

  /* An expired sale is ignored, not removed from the file. */
  function activeSale(item) {
    const s = item.sale;
    if (!s || typeof s.percentOff !== "number") return null;
    if (!(s.percentOff >= 1 && s.percentOff <= 99)) return null;
    if (s.until && String(s.until) < todayLocalISO()) return null;
    return s;
  }

  function effectivePrice(item) {
    const s = activeSale(item);
    if (!s) return item.price;
    return Math.round(item.price * (1 - s.percentOff / 100) * 100) / 100;
  }

  const menuEl  = document.getElementById("menu");
  const totalEl = document.getElementById("total");
  const countEl = document.getElementById("count");
  const payBtn  = document.getElementById("payBtn");

  let state = [];
  let venmoUsername = "";
  let standName = "";

  function el(tag, className, text) {
    const n = document.createElement(tag);
    if (className) n.className = className;
    if (text !== undefined) n.textContent = text;
    return n;
  }

  function showState(message, hint, withRetry) {
    state = [];
    updateTotals();
    menuEl.replaceChildren();
    const box = el("div", "state");
    box.appendChild(el("p", null, message));
    if (hint) box.appendChild(el("p", "hint", hint));
    if (withRetry) {
      const btn = el("button", "retry", "Try again");
      btn.addEventListener("click", load);
      box.appendChild(btn);
    }
    menuEl.appendChild(box);
  }

  function render(menu) {
    state = [];
    menuEl.replaceChildren();
    document.title = menu.name || "Snack-O";
    const h1 = document.querySelector("h1");
    if (menu.name) h1.textContent = menu.name;
    venmoUsername = menu.venmoUsername || "";
    standName = menu.name || "";

    let anyVisible = false;

    (menu.categories || []).forEach(cat => {
      const items = (cat.items || []).filter(it => !it.hidden);
      if (items.length === 0) return;   // skip empty categories
      anyVisible = true;

      const section = el("section", "cat");
      const head = el("div", "cat-head");
      head.appendChild(el("span", "cat-title", cat.label || ""));
      const rule = el("span", "cat-rule");
      rule.setAttribute("aria-hidden", "true");
      head.appendChild(rule);
      section.appendChild(head);

      const list = el("div", "list");
      items.forEach(item => {
        const entry = { name: item.name, price: effectivePrice(item), qty: 0 };
        state.push(entry);
        list.appendChild(itemRow(item, entry));
      });
      section.appendChild(list);
      menuEl.appendChild(section);
    });

    if (!anyVisible) {
      showState("Nothing for sale right now.", "Check back soon.", false);
      return;
    }
    updateTotals();
  }

  function itemRow(item, entry) {
    const row = el("div", "item");

    /* Name (+ optional description) */
    const nameBlock = el("div", "name-block");
    const nameLead = el("span", "name-lead");
    nameLead.appendChild(el("span", "name", item.name));
    const lead = el("span", "lead");
    lead.setAttribute("aria-hidden", "true");
    nameLead.appendChild(lead);
    nameBlock.appendChild(nameLead);
    if (item.description && String(item.description).trim() !== "") {
      nameBlock.appendChild(el("span", "desc", item.description));
    }
    row.appendChild(nameBlock);

    /* Price, with sale treatment when one is running */
    const sale = activeSale(item);
    const priceBlock = el("div", "price-block");
    if (sale) {
      priceBlock.appendChild(el("span", "sale-tag", sale.percentOff + "% OFF"));
      const line = el("span", "price-line");
      line.appendChild(el("span", "price was", item.price.toFixed(2)));
      line.appendChild(el("span", "price", entry.price.toFixed(2)));
      priceBlock.appendChild(line);
    } else {
      priceBlock.appendChild(el("span", "price", entry.price.toFixed(2)));
    }
    row.appendChild(priceBlock);

    /* Stepper */
    const qty = el("div", "qty");
    const minus = el("button", "minus", "−");
    minus.setAttribute("aria-label", "Remove one " + item.name);
    minus.disabled = true;
    const num = el("span", "q-num", "0");
    const plus = el("button", "plus", "+");
    plus.setAttribute("aria-label", "Add one " + item.name);
    qty.append(minus, num, plus);
    row.appendChild(qty);

    const sync = () => {
      num.textContent = entry.qty;
      row.classList.toggle("active", entry.qty > 0);
      minus.disabled = entry.qty === 0;
      updateTotals();
    };
    plus.addEventListener("click", () => { entry.qty++; sync(); });
    minus.addEventListener("click", () => { if (entry.qty > 0) entry.qty--; sync(); });

    return row;
  }

  function updateTotals() {
    const total = state.reduce((s, it) => s + it.qty * it.price, 0);
    const count = state.reduce((s, it) => s + it.qty, 0);
    totalEl.textContent = money(total);
    countEl.textContent = count;

    if (total <= 0) {
      payBtn.classList.add("disabled");
      payBtn.removeAttribute("href");
      return;
    }
    payBtn.classList.remove("disabled");

    /* The query is built by hand rather than with URLSearchParams, which
       encodes spaces as "+" — Venmo shows the note verbatim, plus signs and
       all. encodeURIComponent uses %20, which Venmo renders as a space. */
    const query = [
      "txn=pay",
      "amount=" + encodeURIComponent(total.toFixed(2)),
      "note="   + encodeURIComponent(buildNote()),
    ].join("&");
    payBtn.href = `https://venmo.com/${encodeURIComponent(venmoUsername)}?${query}`;
  }

  /* Reads like a sentence rather than a receipt dump: the "1x" is dropped for
     single items and the last one is joined with "and". */
  function buildNote() {
    const parts = state.filter(it => it.qty > 0)
                       .map(it => (it.qty > 1 ? it.qty + "x " : "") + it.name);

    let list;
    if (parts.length === 1)      list = parts[0];
    else if (parts.length === 2) list = parts[0] + " and " + parts[1];
    else                         list = parts.slice(0, -1).join(", ") + ", and " + parts[parts.length - 1];

    const note = standName ? `${standName}: ${list}` : list;
    /* Venmo caps the note at 280 characters and silently drops the rest. */
    return note.length > 280 ? note.slice(0, 277) + "..." : note;
  }

  async function load() {
    showState("Loading menu…", null, false);
    try {
      /* Cache-busted: GitHub Pages sits behind a CDN, and without this a price
         change can take several minutes to show up. */
      const res = await fetch(`menu.json?v=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const menu = await res.json();
      if (!menu || !Array.isArray(menu.categories)) throw new Error("Malformed menu");
      render(menu);
    } catch (err) {
      showState(
        "Couldn't load the menu.",
        "Check your connection and try again. (" + err.message + ")",
        true
      );
    }
  }

  load();
</script>
</body>
</html>
